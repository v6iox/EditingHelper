# XcodeGen project definition. Generate the Xcode project with:
#   brew install xcodegen
#   cd ios && xcodegen
# then open EditSync.xcodeproj, set your signing team, and run.
name: EditSync
options:
  bundleIdPrefix: com.86autolab
  deploymentTarget:
    iOS: "16.0"
targets:
  EditSync:
    type: application
    platform: iOS
    sources: [EditSync]
    info:
      path: EditSync/Info.plist
      properties:
        CFBundleDisplayName: EditSync
        CFBundleShortVersionString: "1.4.1"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        NSPhotoLibraryUsageDescription: >-
          EditSync reads the videos you pick so it can sync them by sound.
        NSPhotoLibraryAddUsageDescription: >-
          EditSync saves your finished video to the camera roll.
        NSAppleMusicUsageDescription: >-
          EditSync can loop a song you pick as background music.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.86autolab.editsync.ios
        TARGETED_DEVICE_FAMILY: "1"
        SWIFT_VERSION: "5.9"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.4.1
